name: Deploy to Cloudflare Pages

# Every push to main rebuilds the clean dist/ and deploys it to the 2147doot
# Pages project. Requires two repo secrets (Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit" + "D1: Edit"
#   CLOUDFLARE_ACCOUNT_ID  — your account id (Cloudflare dashboard URL / Workers&Pages → Account details)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name 2147doot --branch main --commit-dirty=true
